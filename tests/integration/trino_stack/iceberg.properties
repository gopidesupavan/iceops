connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://rest:8181
iceberg.rest-catalog.warehouse=s3://warehouse/
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.region=us-east-1
s3.aws-access-key=iceops
s3.aws-secret-key=iceops-secret
# allow tiny retention in tests so expire/remove_orphan_files work on fresh data
iceberg.expire-snapshots.min-retention=0s
iceberg.remove-orphan-files.min-retention=0s
