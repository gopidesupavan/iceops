# Real Trino + Iceberg REST catalog + MinIO stack for gated compaction verification.
# Started/stopped by tests/integration/test_trino_compact_lab.py (ICEOPS_RUN_TRINO=1).
# Image tags are pinned (not `latest`) so the test is reproducible.

name: iceops-trino-lab

services:
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: iceops
      MINIO_ROOT_PASSWORD: iceops-secret
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  # one-shot: create the warehouse bucket, then exit
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 iceops iceops-secret &&
      mc mb --ignore-existing local/warehouse &&
      echo 'bucket ready'
      "

  rest:
    image: apache/iceberg-rest-fixture:1.9.0
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: iceops
      AWS_SECRET_ACCESS_KEY: iceops-secret
      AWS_REGION: us-east-1

  trino:
    image: trinodb/trino:476
    depends_on:
      - rest
    ports:
      - "8080:8080"
    volumes:
      - ./iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
