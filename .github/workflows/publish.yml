name: publish

# Publishes iceops to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Fires when a GitHub Release is published. Create the release from a tag like v0.1.0.
#
# One-time PyPI setup (project owner, in the PyPI web UI):
#   Project 'iceops' -> Settings -> Publishing -> Add a trusted publisher (GitHub):
#     Owner:       gopidesupavan
#     Repository:  iceops
#     Workflow:    publish.yml
#     Environment: pypi
#   Then create a GitHub environment named 'pypi' (Settings -> Environments),
#   optionally with required reviewers so a human approves each release.

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "release tag: $TAG   package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::release tag ($TAG) does not match pyproject version ($PKG)"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
