name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: Integration tests
        run: uv run pytest tests/integration

  e2e:
    name: e2e journeys (real CLI subprocess)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: End-to-end journeys
        run: uv run pytest tests/e2e

  engines:
    name: engine labs (real Spark + Trino)
    runs-on: ubuntu-latest
    # kept off the core matrix: pulls JVMs/containers, slower and heavier — a hiccup here
    # must never red the core build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with engine extras)
        run: uv sync --all-groups --extra spark --extra trino

      - name: Spark compaction lab (local JVM)
        run: ICEOPS_RUN_SPARK=1 uv run pytest tests/integration/test_spark_compact_lab.py

      - name: Real-engine CLI execution e2e (iceops binary --engine spark --yes)
        run: ICEOPS_RUN_SPARK=1 uv run pytest tests/e2e/test_engine_execution.py

      - name: Trino compaction lab (REST catalog + MinIO + Trino containers)
        run: ICEOPS_RUN_TRINO=1 uv run pytest tests/integration/test_trino_compact_lab.py
